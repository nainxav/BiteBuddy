<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BiteBuddy</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">
    <header class="header">
      <h1>BiteBuddy</h1>
      <p class="tagline">Log meals, ask before eating, stay on budget — calories stay in your app, not in the model.</p>
    </header>

    <aside class="panel">
      <h2>Today</h2>
      <dl class="stats" id="stats">
        <dt>Consumed</dt><dd id="consumed">—</dd>
        <dt>Remaining</dt><dd id="remaining">—</dd>
        <dt>Target</dt><dd id="target">—</dd>
      </dl>
      <h2>Profile</h2>
      <form id="profile-form" class="profile">
        <label>Current weight (kg)
          <input type="number" step="0.1" name="current_weight_kg" id="current_weight_kg" required />
        </label>
        <label>Target weight (kg)
          <input type="number" step="0.1" name="target_weight_kg" id="target_weight_kg" required />
        </label>
        <label>Daily calorie target
          <input type="number" name="daily_calorie_target" id="daily_calorie_target" required />
        </label>
        <button type="submit">Save profile</button>
      </form>
      <p class="hint" id="profile-status"></p>
    </aside>

    <main class="chat">
      <div class="help">
        <strong>Commands:</strong>
        <code>/log fried rice</code> · <code>/log pizza|450</code> ·
        <code>/ask burger</code> · <code>/summary</code>
        <br />
        Or: <code>I ate …</code>, <code>Can I eat …</code>
      </div>
      <div id="messages" class="messages" aria-live="polite"></div>
      <form id="chat-form" class="composer">
        <input type="text" id="message" name="message" autocomplete="off" placeholder="Type a message…" required />
        <button type="submit">Send</button>
      </form>
    </main>
  </div>
  <script>
    const messagesEl = document.getElementById("messages");
    const stats = {
      consumed: document.getElementById("consumed"),
      remaining: document.getElementById("remaining"),
      target: document.getElementById("target"),
    };

    function appendBubble(role, text) {
      const div = document.createElement("div");
      div.className = "bubble " + role;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateStats(data) {
      if (!data || data.consumed_today === undefined) return;
      stats.consumed.textContent = data.consumed_today + " kcal";
      stats.remaining.textContent = data.remaining_today + " kcal";
      stats.target.textContent = data.daily_calorie_target + " kcal";
    }

    async function loadProfile() {
      const r = await fetch("/api/profile");
      const p = await r.json();
      document.getElementById("current_weight_kg").value = p.current_weight_kg;
      document.getElementById("target_weight_kg").value = p.target_weight_kg;
      document.getElementById("daily_calorie_target").value = p.daily_calorie_target;
    }

    document.getElementById("profile-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const body = {
        current_weight_kg: parseFloat(fd.get("current_weight_kg")),
        target_weight_kg: parseFloat(fd.get("target_weight_kg")),
        daily_calorie_target: parseInt(fd.get("daily_calorie_target"), 10),
      };
      const r = await fetch("/api/profile", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const st = document.getElementById("profile-status");
      if (r.ok) {
        st.textContent = "Saved.";
        setTimeout(() => { st.textContent = ""; }, 2000);
      } else {
        st.textContent = "Could not save.";
      }
    });

    document.getElementById("chat-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const input = document.getElementById("message");
      const msg = input.value.trim();
      if (!msg) return;
      appendBubble("user", msg);
      input.value = "";
      try {
        const r = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg }),
        });
        const data = await r.json();
        appendBubble("assistant", data.reply || "(no reply)");
        updateStats(data.data);
      } catch (err) {
        appendBubble("assistant", "Request failed. Is the server running?");
      }
    });

    loadProfile();
    fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: "/summary" }),
    })
      .then((r) => r.json())
      .then((data) => updateStats(data.data))
      .catch(() => {});
  </script>
</body>
</html>
